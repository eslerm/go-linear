name: Check Upstream Updates

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Resolve latest upstream release
        id: upstream
        run: |
          # Resolve the newest @linear/sdk release tag and its commit SHA via
          # the git protocol, then fetch the schema at that immutable SHA.
          # Comparing against a release (not the moving master branch) matches
          # what make sync-upstream targets and avoids an unpinned download.
          TAGS=$(git ls-remote --tags https://github.com/linear/linear.git 'refs/tags/@linear/sdk@*')
          LATEST_TAG=$(printf '%s\n' "$TAGS" \
            | sed -n 's|.*\trefs/tags/\(@linear/sdk@[0-9][0-9.]*\)$|\1|p' \
            | sort -t '@' -k 3 -V | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::could not resolve latest @linear/sdk release tag"
            exit 1
          fi
          # Annotated tags list a dereferenced ^{} commit; prefer it.
          SHA=$(printf '%s\n' "$TAGS" | awk -v t="refs/tags/${LATEST_TAG}^{}" '$2==t {print $1}')
          if [ -z "$SHA" ]; then
            SHA=$(printf '%s\n' "$TAGS" | awk -v t="refs/tags/${LATEST_TAG}" '$2==t {print $1}')
          fi
          if ! printf '%s\n' "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::could not resolve a valid commit SHA for ${LATEST_TAG} (got: ${SHA})"
            exit 1
          fi
          {
            echo "tag=$LATEST_TAG"
            echo "sha=$SHA"
            echo "version=${LATEST_TAG##*@}"
          } >> "$GITHUB_OUTPUT"
          echo "Latest upstream release: $LATEST_TAG ($SHA)"

      - name: Fetch upstream schema at release SHA
        env:
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          curl -sSL --fail "https://raw.githubusercontent.com/linear/linear/${UPSTREAM_SHA}/packages/sdk/src/schema.graphql" \
            -o upstream-schema.graphql

      - name: Compare schemas
        id: check
        run: |
          if [ ! -f "schema.graphql" ]; then
            echo "updates=unknown" >> "$GITHUB_OUTPUT"
            echo "::warning::schema.graphql not found in repository"
            exit 0
          fi

          if ! diff -q schema.graphql upstream-schema.graphql > /dev/null 2>&1; then
            echo "updates=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Upstream schema has changes"

            # Show diff summary
            echo "Schema diff:"
            diff schema.graphql upstream-schema.graphql || true
          else
            echo "updates=false" >> "$GITHUB_OUTPUT"
            echo "✅ Schema is up to date"
          fi

      - name: Create issue if updates found
        if: steps.check.outputs.updates == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
        with:
          script: |
            const version = process.env.UPSTREAM_VERSION;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-sync',
              state: 'open'
            });

            if (issues.data.length > 0) {
              console.log('Issue already exists, skipping creation');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream SDK Update Available (@linear/sdk@${version})`,
              body: `The upstream Linear TypeScript SDK has schema updates.

              **Upstream Version:** \`@linear/sdk@${version}\`
              **Current Schema Date:** \`${new Date().toISOString().split('T')[0]}\`

              ## Action Required

              A maintainer needs to sync the schema:

              \`\`\`bash
              # Enable sync mode (if not already enabled)
              git submodule update --init upstream

              # Run sync
              make sync-upstream

              # Review changes
              git diff

              # Commit and push
              git add .
              git commit -m "chore: sync with upstream @linear/sdk@${version}"
              git push
              \`\`\`

              ## Notes
              - Review schema changes carefully
              - Update queries if new operations added
              - Run full test suite
              - Update documentation if API changes
              `,
              labels: ['upstream-sync', 'maintenance']
            });
