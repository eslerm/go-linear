name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release create/upload/edit
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}

          # Build matrix
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist

          # Cache commit timestamp for reproducible BuildDate (GNU date -d, Linux only)
          BUILD_DATE=$(date -u -d "@$(git log -1 --pretty=%ct)" +%Y-%m-%dT%H:%M:%SZ)

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="dist/go-linear-${VERSION}-${GOOS}-${GOARCH}"

            if [ "$GOOS" = "windows" ]; then
              output="${output}.exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w -buildid= \
                -X github.com/chainguard-sandbox/go-linear/v2/pkg/linear.Version=${VERSION} \
                -X github.com/chainguard-sandbox/go-linear/v2/pkg/linear.GitCommit=${GITHUB_SHA} \
                -X github.com/chainguard-sandbox/go-linear/v2/pkg/linear.GitTreeState=clean \
                -X github.com/chainguard-sandbox/go-linear/v2/pkg/linear.BuildDate=${BUILD_DATE}" \
              -o "$output" \
              ./cmd/linear
          done

          # Create checksums
          cd dist
          sha256sum go-linear-* > checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          PRERELEASE=""
          if [[ "$VERSION" == *"-"* ]]; then
            PRERELEASE="--prerelease"
          fi

          # Create draft release if it doesn't already exist (idempotent for re-runs).
          if ! gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$VERSION" \
              --generate-notes \
              --draft \
              ${PRERELEASE:+"$PRERELEASE"}
          fi

          # Upload artifacts to the draft release (--clobber handles re-runs).
          gh release upload "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            dist/go-linear-* \
            dist/checksums.txt

          # Publish the release.
          gh release edit "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
