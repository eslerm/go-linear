query GetProject($id: String!) {
  project(id: $id) {
    id
    name
    description
    state
    createdAt
    updatedAt
    startedAt
    completedAt
    canceledAt
    targetDate
    progress
    health
    healthUpdatedAt
    url
    icon
    color
    lead {
      id
      name
      email
    }
    members(first: 50) {
      nodes {
        id
        name
        email
      }
    }
    teams(first: 10) {
      nodes {
        id
        name
        key
      }
    }
    initiatives(first: 10) {
      nodes {
        id
        name
        status
      }
    }
    projectMilestones(first: 50) {
      nodes {
        id
        name
        description
        targetDate
        sortOrder
      }
    }
  }
}

query ListProjects($first: Int, $after: String) {
  projects(first: $first, after: $after) {
    nodes {
      id
      name
      description
      state
      createdAt
      updatedAt
      targetDate
      progress
      health
      url
      icon
      color
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query ListProjectsFiltered($first: Int, $after: String, $filter: ProjectFilter) {
  projects(first: $first, after: $after, filter: $filter) {
    nodes {
      id
      name
      description
      state
      createdAt
      updatedAt
      targetDate
      progress
      health
      url
      icon
      color
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query ListProjectLabels($first: Int, $after: String) {
  projectLabels(first: $first, after: $after) {
    nodes {
      id
      name
      color
      description
      isGroup
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query GetProjectLabel($id: String!) {
  projectLabel(id: $id) {
    id
    name
    color
    description
    isGroup
  }
}

query ListProjectRelations($first: Int, $after: String) {
  projectRelations(first: $first, after: $after) {
    nodes {
      id
      type
      anchorType
      relatedAnchorType
      project {
        id
        name
      }
      relatedProject {
        id
        name
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
